<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>送信エラー｜すず美容形成外科医院</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@400;500;600&display=swap" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    background:
      radial-gradient(ellipse at 20% 30%, rgba(90,181,160,0.22) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(90,181,160,0.15) 0%, transparent 50%),
      linear-gradient(160deg, #daf0eb 0%, #f5fbf9 40%, #e4f3ef 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 56px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 40px rgba(20,60,55,0.12);
  }
  .icon {
    width: 64px;
    height: 64px;
    background: rgba(255,100,80,0.08);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .icon svg { width: 32px; height: 32px; color: #e05a4a; }
  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    color: #2d2d2d;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }
  p {
    font-size: 14px;
    color: rgba(45,45,45,0.65);
    line-height: 1.9;
    margin-bottom: 10px;
  }
  .tel {
    font-size: 18px;
    font-weight: 700;
    color: #5ab5a0;
    margin: 4px 0 24px;
  }
  .btn {
    display: inline-block;
    padding: 14px 32px;
    background: #4BAF9A;
    color: #fff;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </div>
    <h1>送信に失敗しました</h1>
    <p>大変申し訳ありません。<br>送信中にエラーが発生しました。</p>
    <p>お手数ですが、お電話にてお問い合わせください。</p>
    <div class="tel">082-222-6671</div>
    <p style="font-size:12px; margin-bottom:24px;">受付時間：10:00〜19:00</p>
    <a href="javascript:history.back()" class="btn">フォームに戻る</a>
  </div>
</body>
</html>
